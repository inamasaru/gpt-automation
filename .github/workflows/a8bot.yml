name: A8-Auto-Bot
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/a8bot.yml"
      - "a8_bot.py"
      - "n8n_notifier.py"
  schedule:
    - cron: "0 * * * *"  # every hour
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to run (defaults to main)"
        required: false
        default: "main"
      self_test:
        description: "Run with sample data using python3 -B a8_bot.py --self-test"
        required: false
        default: "false"
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref || 'main' }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run A8 bot
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_A8_DB_ID: ${{ secrets.NOTION_A8_DB_ID }}
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          A8_API_KEY: ${{ secrets.A8_API_KEY }}
          A8_API_URL: ${{ secrets.A8_API_URL }}
          A8_LOOKBACK_DAYS: ${{ secrets.A8_LOOKBACK_DAYS || '1' }}
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event.inputs.self_test }}" = "true" ]; then
            python3 -B a8_bot.py --self-test
          else
            python a8_bot.py
          fi
      - name: Upload n8n payload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: n8n-payload
          path: |
            logs/n8n_payload.json
            logs/n8n_response.json
          if-no-files-found: ignore
